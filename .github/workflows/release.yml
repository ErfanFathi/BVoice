name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            libpulse-dev \
            libclang-dev \
            libssl-dev \
            libstdc++-12-dev \
            pkg-config \
            build-essential

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          prefix-key: 'v1-ubuntu-2204'

      - name: Install npm dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: true
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'BVoice ${{ github.ref_name }}'
          releaseBody: |
            Linux builds of BVoice ${{ github.ref_name }}.

            | Format | For                      |
            |--------|--------------------------|
            | `.deb` | Debian / Ubuntu          |
            | `.rpm` | Fedora / RHEL / openSUSE |

            The whisper model (~75–466 MB depending on your choice) downloads on first run.
          releaseDraft: true
          prerelease: false
          args: '--bundles deb,rpm'
